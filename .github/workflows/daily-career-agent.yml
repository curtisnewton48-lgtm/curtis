name: Daily Career Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run career agent
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_RESEARCH_DOC_ID: ${{ secrets.GOOGLE_RESEARCH_DOC_ID }}
          GOOGLE_RESEARCH_FOLDER_ID: ${{ secrets.GOOGLE_RESEARCH_FOLDER_ID }}
          PROFILE_CONTEXT: ${{ secrets.PROFILE_CONTEXT }}
          MODEL_PROVIDER: ${{ secrets.MODEL_PROVIDER }}
          MODEL_NAME: ${{ secrets.MODEL_NAME }}
          STAGE_TWO_MODEL_NAME: ${{ secrets.STAGE_TWO_MODEL_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_ENGINE_ID: ${{ secrets.GOOGLE_SEARCH_ENGINE_ID }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          ADZUNA_COUNTRY: ${{ vars.ADZUNA_COUNTRY || 'gb' }}
          ADZUNA_WHERE: ${{ vars.ADZUNA_WHERE || 'United Kingdom' }}
          REED_LOCATION: ${{ vars.REED_LOCATION || 'United Kingdom' }}
          JOB_QUERIES: ${{ vars.JOB_QUERIES || 'paralegal, trainee solicitor, legal caseworker, immigration caseworker, housing caseworker' }}
          GOOGLE_SEARCH_SITES: ${{ vars.GOOGLE_SEARCH_SITES || 'legalcheek.com, lawcareers.net, jobs.lawgazette.co.uk, totallylegal.com, jobs.ac.uk, charityjob.co.uk, civilservicejobs.service.gov.uk, indeed.com' }}
          BRAVE_SEARCH_SITES: ${{ vars.BRAVE_SEARCH_SITES || 'legalcheek.com, lawcareers.net, jobs.lawgazette.co.uk, totallylegal.com, jobs.ac.uk, charityjob.co.uk, civilservicejobs.service.gov.uk, indeed.com' }}
          SHORTLIST_PRACTICE_AREAS: ${{ vars.SHORTLIST_PRACTICE_AREAS || 'private client, wills, employment, antitrust, competition law, human rights, eu law, immigration law, real estate, housing, international law' }}
          ADZUNA_RESULTS_PER_QUERY: ${{ vars.ADZUNA_RESULTS_PER_QUERY || '20' }}
          REED_RESULTS_PER_QUERY: ${{ vars.REED_RESULTS_PER_QUERY || '20' }}
          GOOGLE_SEARCH_RESULTS_PER_SITE: ${{ vars.GOOGLE_SEARCH_RESULTS_PER_SITE || '3' }}
          BRAVE_SEARCH_RESULTS_PER_SITE: ${{ vars.BRAVE_SEARCH_RESULTS_PER_SITE || '5' }}
          MAX_JOBS_PER_RUN: ${{ vars.MAX_JOBS_PER_RUN || '20' }}
          MAX_JOBS_PER_MONTH: ${{ vars.MAX_JOBS_PER_MONTH || '300' }}
          MIN_FIT_SCORE: ${{ vars.MIN_FIT_SCORE || '65' }}
          STAGE_TWO_MIN_FIT_SCORE: ${{ vars.STAGE_TWO_MIN_FIT_SCORE || '80' }}
        run: python -m career_agent.main
